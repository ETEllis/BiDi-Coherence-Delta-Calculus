name: formal-gate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    name: Native CDC, bridge, reducer, and formal gate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Coq
        run: |
          sudo apt-get update
          sudo apt-get install -y coq

      - name: Install Lean
        run: |
          curl -sSfL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain leanprover/lean4:stable
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Tool versions
        run: |
          python3 --version
          cc --version
          lean --version
          coqc --version

      - name: Run full verification gate
        run: ./scripts/verify.sh
