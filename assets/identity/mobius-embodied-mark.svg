<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">Embodied Möbius mark</title>
  <desc id="desc">A living cyan and indigo Möbius ribbon with two literal eyes.</desc>
  <defs>
    <linearGradient id="ribbon" x1="42" y1="58" x2="216" y2="210" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#29e4e7"/>
      <stop offset="0.42" stop-color="#079ed8"/>
      <stop offset="0.68" stop-color="#244bc5"/>
      <stop offset="1" stop-color="#171463"/>
    </linearGradient>
    <linearGradient id="face" x1="81" y1="52" x2="180" y2="95" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#43f0ec"/>
      <stop offset="1" stop-color="#11b8db"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <path d="M87 74C116 56 158 60 181 84C207 111 204 154 178 182C149 213 101 209 76 179C51 149 52 102 87 74Z" fill="none" stroke="url(#ribbon)" stroke-width="34" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- The bright face is the front sheet at the half-twist seam. -->
  <path d="M86 74C111 58 149 60 175 79" fill="none" stroke="url(#face)" stroke-width="34" stroke-linecap="round"/>
  <path d="M72 171C91 195 122 206 148 197" fill="none" stroke="#243fc0" stroke-opacity=".72" stroke-width="14" stroke-linecap="round"/>
  <g fill="#37ebe9" filter="url(#glow)">
    <circle cx="114" cy="42" r="8"/>
    <circle cx="142" cy="42" r="8"/>
  </g>
</svg>
